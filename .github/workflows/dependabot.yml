name: Dependabot

on:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: cargo update

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          
          git checkout -b bot/update
          git add Cargo.lock
          git commit -m "Update dependencies" || true
          git push -f origin bot/update
          
          gh pr create --title "Update deps" --body "Mise a jour" --label "bot/update" --base main --head bot/update || true
