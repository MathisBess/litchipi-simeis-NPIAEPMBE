name: DIY Dependabot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-update
        run: cargo install cargo-update

      - name: Update dependencies
        run: cargo update

      - name: Create Pull Request with gh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          
          BRANCH="bot/update"
          git checkout -b $BRANCH
          git add Cargo.lock
          
          # Si il y a des changements on commit et on push
          if ! git diff --staged --quiet; then
            git commit -m "Update dependencies"
            git push -f origin $BRANCH
            
            # On cree la PR seulement si elle n existe pas deja
            if ! gh pr view $BRANCH > /dev/null 2>&1; then
              gh pr create --title "Update dependances" --body "Mise a jour auto" --base main --head $BRANCH
            fi
          fi
